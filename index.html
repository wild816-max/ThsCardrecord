<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊導論卡牌對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .player-card {
            transition: all 0.3s ease;
        }
        .game-over {
            background-color: #fee2e2 !important;
            border: 2px solid #ef4444 !important;
            opacity: 0.8;
        }
        .game-over-badge {
            display: none;
            color: #ef4444;
            font-weight: bold;
            text-transform: uppercase;
        }
        .game-over .game-over-badge {
            display: block;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-2">🛳️ 旅遊導論卡牌對決</h1>
            <p class="text-slate-600">遊戲進度即時記錄系統</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="players-container">
            <!-- 產生四個玩家卡片 -->
            <script>
                const stages = ["階段一：發掘", "階段二：投入", "階段三：發展", "階段四：鞏固", "階段五：停滯"];
                
                for (let i = 1; i <= 4; i++) {
                    document.write(`
                    <div id="player-${i}" class="player-card bg-white rounded-xl shadow-md p-6 border border-slate-200">
                        <div class="mb-4">
                            <input type="text" placeholder="玩家 ${i} 姓名" class="w-full text-xl font-bold border-b-2 border-slate-100 focus:border-blue-500 outline-none pb-1 mb-2">
                            <div class="game-over-badge text-sm">⚠️ 玩家 GAME OVER</div>
                        </div>

                        <!-- 階段選擇 -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-500 mb-2">當前階段</label>
                            <select class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                                ${stages.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>

                        <!-- 收入記錄 -->
                        <div class="mb-6">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-sm font-medium text-slate-500">累計收入 ($)</label>
                                <span id="income-val-${i}" class="text-lg font-bold text-green-600">$0</span>
                            </div>
                            <input type="range" min="0" max="200" step="10" value="0" 
                                oninput="updateValue(${i}, 'income', this.value)"
                                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-500">
                            <div class="flex justify-between text-xs text-slate-400 mt-1">
                                <span>$0</span>
                                <span>$200</span>
                            </div>
                        </div>

                        <!-- 壓力記錄 -->
                        <div class="mb-2">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-sm font-medium text-slate-500">壓力指數</label>
                                <span id="stress-val-${i}" class="text-lg font-bold text-slate-700">0 / 100</span>
                            </div>
                            <input type="range" min="0" max="110" step="10" value="0" 
                                oninput="updateValue(${i}, 'stress', this.value)"
                                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-red-500">
                            <div class="flex justify-between text-xs text-slate-400 mt-1">
                                <span>0</span>
                                <span class="text-red-500">100 (極限)</span>
                            </div>
                        </div>
                    </div>
                    `);
                }

                function updateValue(playerNum, type, val) {
                    const display = document.getElementById(`${type}-val-${playerNum}`);
                    const card = document.getElementById(`player-${playerNum}`);
                    
                    if (type === 'income') {
                        display.innerText = `$${val}`;
                    } else if (type === 'stress') {
                        display.innerText = `${val} / 100`;
                        
                        // 檢查是否 Game Over
                        if (parseInt(val) > 100) {
                            card.classList.add('game-over');
                            display.classList.add('text-red-600');
                        } else {
                            card.classList.remove('game-over');
                            display.classList.remove('text-red-600');
                        }
                    }
                }
            </script>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>© 2024 旅遊導論教學輔助工具 - 保持冷靜，謹慎投資</p>
            <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-600 rounded-lg transition-colors">
                重置遊戲
            </button>
        </footer>
    </div>
</body>
</html>
